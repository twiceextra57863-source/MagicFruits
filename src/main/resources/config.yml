# MagicFruits Configuration
plugin:
  version: 1.0.0
  name: MagicFruits

settings:
  # First join reward - new players get a fruit spin
  first-join-reward: true
  
  # Drop on death - fruits drop when player dies
  drop-on-death: true
  
  # Cooldown time in seconds for fruit abilities
  cooldown-seconds: 30
  
  # Spin duration in seconds
  spin-duration-seconds: 15
  
  # Visual effects
  particles-enabled: true
  sounds-enabled: true

messages:
  prefix: "§8[§6MagicFruits§8] §r"
  cooldown: "§c§l⚠ §fAbility on cooldown! §7(%seconds% seconds)"
  no-permission: "§cYou don't have permission to use this!"
  fruit-received: "§a§l✦ You received a mystical fruit! ✦"
  ability-activated: "§6§l✨ Ability Activated! ✨"
  death-drop: "§c§l💀 §fYour magical fruits have been dropped on death!"
  first-join-spin: "§a§l✨ Welcome! Starting your magical fruit spin! ✨"
