# MagicFruits Configuration
plugin:
  version: 1.0.0
  name: MagicFruits

settings:
  # First join reward - new players get a fruit spin (Admin can toggle from GUI)
  first-join-reward: true
  
  # Drop on death - fruits drop when player dies (Admin can toggle from GUI)
  drop-on-death: true
  
  # Cooldown time in seconds for fruit abilities
  cooldown-seconds: 30
  
  # Spin duration in seconds
  spin-duration-seconds: 15
  
  # Visual effects
  particles-enabled: true
  sounds-enabled: true

# Reset players list (auto-managed)
reset-players: []

messages:
  prefix: "§8[§6MagicFruits§8] §r"
  cooldown: "§c§l⚠ §fAbility on cooldown! §7(%seconds% seconds)"
  no-permission: "§cYou don't have permission to use this!"
  fruit-received: "§a§l✦ You received a mystical fruit! ✦"
  ability-activated: "§6§l✨ Ability Activated! ✨"
  death-drop: "§c§l💀 §fYour magical fruits have been dropped on death!"
  first-join-spin: "§a§l✨ Welcome! Starting your magical fruit spin! ✨"
  data-reset: "§c§l⚠ §fYour magical fruit data has been reset by an admin!"
  data-reset-all: "§c§l⚠ §6MagicFruits §f- All player data has been reset!"
  grace-protected: "§a§l🛡️ §fYour fruits were protected during grace period!"
