name: Build MagicFruits Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    
    - name: Build with Maven
      run: mvn clean package -DskipTests
    
    - name: Upload Plugin JAR
      uses: actions/upload-artifact@v4
      with:
        name: MagicFruits-Plugin
        path: target/MagicFruits-*.jar
        if-no-files-found: error
    
    - name: Get Plugin Version
      id: get_version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "artifact_name=MagicFruits-$VERSION.jar" >> $GITHUB_OUTPUT
    
    - name: Upload to GitHub Packages (Optional)
      run: |
        echo "Build completed successfully!"
        echo "Plugin version: ${{ steps.get_version.outputs.version }}"
        echo "Artifact: target/MagicFruits-${{ steps.get_version.outputs.version }}.jar"
